openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: QUANTEX API - AI-powered technician booking platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User profile operations
  - name: technicians
    description: Technician operations
  - name: bookings
    description: Booking operations
  - name: reviews
    description: Review operations
  - name: service-categories
    description: Service category operations
  - name: dashboard
    description: Dashboard summary operations
  - name: ai
    description: AI issue analysis operations
  - name: analytics
    description: Platform analytics operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  # Users
  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # Service Categories
  /service-categories:
    get:
      operationId: listServiceCategories
      tags: [service-categories]
      summary: List all service categories
      responses:
        "200":
          description: Service categories list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceCategory"

  # Technicians
  /technicians:
    get:
      operationId: listTechnicians
      tags: [technicians]
      summary: List technicians
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Full-text search across name, bio, skills, profession, and services
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: available
          in: query
          schema:
            type: boolean
        - name: isAvailable
          in: query
          schema:
            type: boolean
          description: Filter by availability (alias for available)
        - name: verified
          in: query
          schema:
            type: boolean
          description: Only return technicians with verification badges
        - name: minRating
          in: query
          schema:
            type: number
          description: Minimum rating (inclusive)
        - name: maxRate
          in: query
          schema:
            type: number
          description: Maximum hourly rate (inclusive)
        - name: currentStatus
          in: query
          schema:
            $ref: "#/components/schemas/TechnicianStatus"
          description: Filter by current status
        - name: emergencyAvailable
          in: query
          schema:
            type: boolean
          description: Only return technicians with emergency service available
        - name: minExperience
          in: query
          schema:
            type: integer
          description: Minimum years of experience (inclusive)
        - name: lat
          in: query
          schema:
            type: number
          description: Customer latitude (decimal degrees) for distance calculations
        - name: lng
          in: query
          schema:
            type: number
          description: Customer longitude (decimal degrees) for distance calculations
        - name: radius
          in: query
          schema:
            type: number
          description: Maximum distance in km from customer location (requires lat+lng)
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [highest_rated, lowest_price, most_experienced, fastest, nearest]
          description: Sort order
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Technicians list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Technician"
    post:
      operationId: createTechnicianProfile
      tags: [technicians]
      summary: Create technician profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TechnicianInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Technician"

  /technicians/me:
    get:
      operationId: getMyTechnicianProfile
      tags: [technicians]
      summary: Get the authenticated technician's own profile
      responses:
        "200":
          description: Technician profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Technician"
        "401":
          description: Unauthorized
        "404":
          description: No profile found

  /technicians/{id}:
    get:
      operationId: getTechnician
      tags: [technicians]
      summary: Get technician by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Technician found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Technician"
        "404":
          description: Not found
    patch:
      operationId: updateTechnician
      tags: [technicians]
      summary: Update technician profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TechnicianUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Technician"

  /technicians/{id}/reviews:
    get:
      operationId: getTechnicianReviews
      tags: [technicians]
      summary: Get reviews for a technician
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviews list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  # Bookings
  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List bookings for current user
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, accepted, in_progress, completed, cancelled]
        - name: role
          in: query
          schema:
            type: string
            enum: [customer, technician]
      responses:
        "200":
          description: Bookings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a new booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get booking by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found

  /bookings/{id}/status:
    patch:
      operationId: updateBookingStatus
      tags: [bookings]
      summary: Update booking status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}/tracking:
    get:
      operationId: getBookingTracking
      tags: [bookings]
      summary: Get live tracking info for a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tracking info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackingInfo"

  # Reviews
  /reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      summary: List all public reviews
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Reviews list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Submit a review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  # Dashboard
  /dashboard/customer:
    get:
      operationId: getCustomerDashboard
      tags: [dashboard]
      summary: Get customer dashboard summary
      responses:
        "200":
          description: Customer dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDashboard"

  /dashboard/technician:
    get:
      operationId: getTechnicianDashboard
      tags: [dashboard]
      summary: Get technician dashboard summary
      responses:
        "200":
          description: Technician dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TechnicianDashboard"

  # AI
  /ai/analyze-issue:
    post:
      operationId: analyzeIssue
      tags: [ai]
      summary: AI analysis of a technical issue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueAnalysisInput"
      responses:
        "200":
          description: AI analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueAnalysisResult"

  /ai/technician-brief:
    post:
      operationId: getTechnicianBrief
      tags: [ai]
      summary: AI-generated brief for a technician before a job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TechnicianBriefInput"
      responses:
        "200":
          description: AI technician brief
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TechnicianBriefResult"

  # Analytics
  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Platform-wide analytics summary
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    # Auth
    RegisterInput:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [customer, technician]
        phone:
          type: ["string", "null"]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    # User
    User:
      type: object
      required: [id, name, email, role, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [customer, technician]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]

    # Service Category
    ServiceCategory:
      type: object
      required: [id, name, icon, description]
      properties:
        id:
          type: integer
        name:
          type: string
        icon:
          type: string
        description:
          type: string

    # Technician
    TechnicianStatus:
      type: string
      enum: [online, offline, busy, on_break, emergency_only]

    Technician:
      type: object
      required: [id, userId, name, skills, rating, reviewCount, isAvailable, completedJobs, hourlyRate, responseTime]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        profilePictureUrl:
          type: ["string", "null"]
        skills:
          type: array
          items:
            type: string
        rating:
          type: number
        reviewCount:
          type: integer
        isAvailable:
          type: boolean
        completedJobs:
          type: integer
        hourlyRate:
          type: number
        responseTime:
          type: string
        distance:
          type: ["number", "null"]
        latitude:
          type: ["number", "null"]
        longitude:
          type: ["number", "null"]
        currentStatus:
          $ref: "#/components/schemas/TechnicianStatus"
        verificationBadges:
          type: array
          items:
            type: string
        categoryIds:
          type: array
          items:
            type: integer
        profession:
          type: array
          items:
            type: string
        servicesOffered:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        yearsExperience:
          type: ["integer", "null"]
        certifications:
          type: array
          items:
            type: string
        previousCompany:
          type: ["string", "null"]
        areasOfExpertise:
          type: array
          items:
            type: string
        languagesSpoken:
          type: array
          items:
            type: string
        visitCharge:
          type: ["number", "null"]
        perJobRate:
          type: ["number", "null"]
        inspectionCharge:
          type: ["number", "null"]
        emergencyCharge:
          type: ["number", "null"]
        weekendCharge:
          type: ["number", "null"]
        nightCharge:
          type: ["number", "null"]
        workingDays:
          type: array
          items:
            type: string
        workingHoursStart:
          type: ["string", "null"]
        workingHoursEnd:
          type: ["string", "null"]
        emergencyAvailable:
          type: boolean
        vacationMode:
          type: boolean
        maxDailyBookings:
          type: ["integer", "null"]
        serviceRadius:
          type: ["integer", "null"]
        serviceCity:
          type: ["string", "null"]
        pinCode:
          type: ["string", "null"]
        gender:
          type: ["string", "null"]
        dateOfBirth:
          type: ["string", "null"]

    TechnicianInput:
      type: object
      required: [skills, hourlyRate, responseTime]
      properties:
        bio:
          type: string
        profilePictureUrl:
          type: string
        currentStatus:
          $ref: "#/components/schemas/TechnicianStatus"
        verificationBadges:
          type: array
          items:
            type: string
        skills:
          type: array
          items:
            type: string
        hourlyRate:
          type: number
        responseTime:
          type: string
        categoryIds:
          type: array
          items:
            type: integer
        profession:
          type: array
          items:
            type: string
        servicesOffered:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        yearsExperience:
          type: integer
        certifications:
          type: array
          items:
            type: string
        previousCompany:
          type: string
        areasOfExpertise:
          type: array
          items:
            type: string
        languagesSpoken:
          type: array
          items:
            type: string
        visitCharge:
          type: number
        perJobRate:
          type: number
        inspectionCharge:
          type: number
        emergencyCharge:
          type: number
        weekendCharge:
          type: number
        nightCharge:
          type: number
        workingDays:
          type: array
          items:
            type: string
        workingHoursStart:
          type: string
        workingHoursEnd:
          type: string
        emergencyAvailable:
          type: boolean
        vacationMode:
          type: boolean
        maxDailyBookings:
          type: integer
        serviceRadius:
          type: integer
        latitude:
          type: number
        longitude:
          type: number
        serviceCity:
          type: string
        pinCode:
          type: string
        gender:
          type: string
        dateOfBirth:
          type: string

    TechnicianUpdate:
      type: object
      properties:
        bio:
          type: string
        profilePictureUrl:
          type: string
        skills:
          type: array
          items:
            type: string
        hourlyRate:
          type: number
        responseTime:
          type: string
        isAvailable:
          type: boolean
        currentStatus:
          $ref: "#/components/schemas/TechnicianStatus"
        categoryIds:
          type: array
          items:
            type: integer
        avatarUrl:
          type: string
        verificationBadges:
          type: array
          items:
            type: string
        latitude:
          type: number
        longitude:
          type: number
        profession:
          type: array
          items:
            type: string
        servicesOffered:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        yearsExperience:
          type: integer
        certifications:
          type: array
          items:
            type: string
        previousCompany:
          type: string
        areasOfExpertise:
          type: array
          items:
            type: string
        languagesSpoken:
          type: array
          items:
            type: string
        visitCharge:
          type: number
        perJobRate:
          type: number
        inspectionCharge:
          type: number
        emergencyCharge:
          type: number
        weekendCharge:
          type: number
        nightCharge:
          type: number
        workingDays:
          type: array
          items:
            type: string
        workingHoursStart:
          type: string
        workingHoursEnd:
          type: string
        emergencyAvailable:
          type: boolean
        vacationMode:
          type: boolean
        maxDailyBookings:
          type: integer
        serviceRadius:
          type: integer
        serviceCity:
          type: string
        pinCode:
          type: string
        gender:
          type: string
        dateOfBirth:
          type: string

    # Booking
    Booking:
      type: object
      required: [id, customerId, technicianId, categoryId, status, issueDescription, scheduledAt, estimatedCost, createdAt]
      properties:
        id:
          type: integer
        customerId:
          type: integer
        technicianId:
          type: integer
        categoryId:
          type: integer
        status:
          type: string
          enum: [pending, accepted, in_progress, completed, cancelled]
        issueDescription:
          type: string
        address:
          type: ["string", "null"]
        scheduledAt:
          type: string
        estimatedCost:
          type: number
        finalCost:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        customerName:
          type: ["string", "null"]
        technicianName:
          type: ["string", "null"]
        categoryName:
          type: ["string", "null"]

    BookingInput:
      type: object
      required: [technicianId, categoryId, issueDescription, scheduledAt, estimatedCost]
      properties:
        technicianId:
          type: integer
        categoryId:
          type: integer
        issueDescription:
          type: string
        address:
          type: string
        scheduledAt:
          type: string
        estimatedCost:
          type: number
        notes:
          type: string

    BookingStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [accepted, in_progress, completed, cancelled]
        notes:
          type: string
        finalCost:
          type: number

    TrackingInfo:
      type: object
      required: [bookingId, status, etaMinutes, technicianLat, technicianLng, progress]
      properties:
        bookingId:
          type: integer
        status:
          type: string
        etaMinutes:
          type: integer
        technicianLat:
          type: number
        technicianLng:
          type: number
        progress:
          type: integer
        lastUpdated:
          type: string

    # Review
    Review:
      type: object
      required: [id, customerId, technicianId, bookingId, rating, comment, createdAt]
      properties:
        id:
          type: integer
        customerId:
          type: integer
        technicianId:
          type: integer
        bookingId:
          type: integer
        rating:
          type: integer
        comment:
          type: string
        customerName:
          type: ["string", "null"]
        technicianName:
          type: ["string", "null"]
        createdAt:
          type: string

    ReviewInput:
      type: object
      required: [technicianId, bookingId, rating, comment]
      properties:
        technicianId:
          type: integer
        bookingId:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string

    # Dashboard
    CustomerDashboard:
      type: object
      required: [activeBookings, completedBookings, totalSpent, upcomingBookings, recentBookings]
      properties:
        activeBookings:
          type: integer
        completedBookings:
          type: integer
        totalSpent:
          type: number
        upcomingBookings:
          type: integer
        recentBookings:
          type: array
          items:
            $ref: "#/components/schemas/Booking"

    TechnicianDashboard:
      type: object
      required: [pendingRequests, activeJobs, completedJobs, totalEarnings, thisMonthEarnings, rating, acceptanceRate, recentBookings]
      properties:
        pendingRequests:
          type: integer
        activeJobs:
          type: integer
        completedJobs:
          type: integer
        totalEarnings:
          type: number
        thisMonthEarnings:
          type: number
        rating:
          type: number
        acceptanceRate:
          type: number
        recentBookings:
          type: array
          items:
            $ref: "#/components/schemas/Booking"

    # AI
    IssueAnalysisInput:
      type: object
      required: [description]
      properties:
        description:
          type: string
          minLength: 10
        imageBase64:
          type: ["string", "null"]

    IssueAnalysisResult:
      type: object
      required: [category, urgency, troubleshootingSteps, technicianType, summary, requiresTechnician, isEmergency]
      properties:
        category:
          type: string
        urgency:
          type: string
          enum: [low, medium, high, critical]
        severity:
          type: string
          enum: [low, medium, high, critical]
        confidence:
          type: ["number", "null"]
        troubleshootingSteps:
          type: array
          items:
            type: string
        technicianType:
          type: string
        summary:
          type: string
        suggestedCategoryId:
          type: ["integer", "null"]
        estimatedCostMin:
          type: ["number", "null"]
        estimatedCostMax:
          type: ["number", "null"]
        estimatedDuration:
          type: ["string", "null"]
        safetyPrecautions:
          type: array
          items:
            type: string
        requiresTechnician:
          type: boolean
        isEmergency:
          type: boolean
        emergencyType:
          type: ["string", "null"]

    TechnicianBriefInput:
      type: object
      required: [issueDescription, categoryName]
      properties:
        issueDescription:
          type: string
        categoryName:
          type: string
        customerName:
          type: ["string", "null"]
        address:
          type: ["string", "null"]

    TechnicianBriefResult:
      type: object
      required: [issueSummary, suggestedParts, safetyRecommendations, estimatedDuration, toolsNeeded]
      properties:
        issueSummary:
          type: string
        suggestedParts:
          type: array
          items:
            type: string
        safetyRecommendations:
          type: array
          items:
            type: string
        estimatedDuration:
          type: string
        toolsNeeded:
          type: array
          items:
            type: string
        difficultyLevel:
          type: ["string", "null"]
        customerTips:
          type: ["string", "null"]

    # Analytics
    AnalyticsSummary:
      type: object
      required: [totalRequests, completedJobs, pendingJobs, cancelledJobs, averageRepairCost, technicianCount, customerCount, topCategories]
      properties:
        totalRequests:
          type: integer
        completedJobs:
          type: integer
        pendingJobs:
          type: integer
        cancelledJobs:
          type: integer
        activeJobs:
          type: integer
        averageRepairCost:
          type: number
        technicianCount:
          type: integer
        customerCount:
          type: integer
        averageTechnicianRating:
          type: number
        topCategories:
          type: array
          items:
            type: object
            required: [name, count]
            properties:
              name:
                type: string
              count:
                type: integer
